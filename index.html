<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smoothia - Premium Virgin Pulp Tissue Paper</title>
  <!-- 澳洲稳定CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.4/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.16/dist/tailwind.min.js"></script>

  <!-- Tailwind 自定义主题配色 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2ca6ad',
            primaryDark: '#239198',
            primaryLight: '#39A8AD',
            darkBlue: '#143B5D',
            textGray: '#6d7f8d',
            bgLight: '#f8fbfb',
          },
          fontFamily: {
            georgia: ['Georgia', 'serif'],
          },
        },
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto { content-visibility: auto; }
      .nav-link-active { @apply text-primary border-b-2 border-primary pb-1; }
      .nav-link { @apply hover:text-primary transition-colors duration-200 cursor-pointer; }
      .card-shadow { @apply hover:shadow-xl transition-all duration-300; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // JS崩溃兜底，防止纯白屏
    window.onerror = function(error) {
      document.getElementById('root').innerHTML = `
        <div style="padding:4rem 2rem;max-width:800px;margin:0 auto;text-align:center;font-family:sans-serif;">
          <h1 style="font-size:42px;color:#2ca6ad;font-style:italic;font-family:Georgia;">Smoothia</h1>
          <p style="font-size:20px;color:#143B5D;margin-top:24px;">Page temporarily unavailable</p>
          <p style="color:#666;margin-top:12px;">Please refresh the page or try a different browser.</p>
        </div>
      `;
    };

    function SmoothiaHomepage() {
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [email, setEmail] = useState('');

      const handleSubscribe = (e) => {
        e.preventDefault();
        const reg = /^[\w.-]+@[\w.-]+\.\w+/;
        if (reg.test(email)) {
          alert('Subscribe success! Thank you.');
          setEmail('');
        } else {
          alert('Please input valid email address');
        }
      };

      const navLinks = [
        { name: 'Home', active: true },
        { name: 'Products', active: false },
        { name: 'About Us', active: false },
        { name: 'Wholesale', active: false },
        { name: 'News', active: false },
        { name: 'Contact Us', active: false },
      ];

      // 仅保留1次GitHub原图，删除重复占位图覆盖代码
      const productList = [
        {
          title: "Toilet Tissue",
          desc: "Soft, strong and gentle for everyday comfort.",
          img: "https://raw.githubusercontent.com/Alwaysmooth/alwaysmooth-official/main/Toilet%20paper.png",
        },
        {
          title: "Facial Tissue",
          desc: "Soft and delicate, perfect for your skin.",
          img: "https://raw.githubusercontent.com/Alwaysmooth/alwaysmooth-official/main/Facial%20tissue.png",
        },
        {
          title: "Kitchen Towel",
          desc: "Strong absorbent, ideal for any kitchen task.",
          img: "https://raw.githubusercontent.com/Alwaysmooth/alwaysmooth-official/main/Kitchen%20towel.png",
        },
        {
          title: "Bulk & Wholesale",
          desc: "Competitive prices, reliable quality supply.",
          img: "https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=1000&auto=format&fit=crop",
        },
      ];

      // 首页大图使用你原本的背景图，无重复定义
      const heroImg = "https://raw.githubusercontent.com/Alwaysmooth/alwaysmooth-official/main/Background.png";
      const featureList = ["100% Virgin Pulp", "Safe & Chemical Free", "Strong & Absorbent", "Sustainable Choice"];
      const advantageList = ["100% Virgin Pulp", "Soft & Thick", "Safe & Chemical Free", "Strong Absorbent", "Sustainable Choice", "Trusted Quality"];

      return (
        <div className="font-sans text-darkBlue bg-bgLight min-h-screen">
          {/* NAVBAR 固定顶部导航 */}
          <header className="w-full bg-white border-b border-[#edf2f2] sticky top-0 z-50">
            <div className="max-w-[1280px] mx-auto flex items-center justify-between py-6 px-8 relative">
              <div>
                <h1 className="text-[52px] leading-none font-semibold italic text-primaryLight font-georgia">Smoothia</h1>
                <p className="tracking-[4px] text-[11px] text-textGray mt-1">SOFT AS SILK AND LUXURIOUSLY RESILIENT</p>
              </div>

              {/* 桌面导航 */}
              <nav className="hidden lg:flex items-center gap-12 text-[16px] font-medium">
                {navLinks.map((item, idx) => (
                  <a key={idx} className={item.active ? "nav-link-active" : "nav-link"}>{item.name}</a>
                ))}
              </nav>

              {/* 桌面报价按钮 */}
              <a
                href="mailto:admin@alwaysmooth.com.au?subject=Get%20a%20Quote&body=Hello%20Smoothia,%0D%0A%0D%0AI%20am%20interested%20in%20your%20products."
                className="hidden lg:inline-block bg-primary hover:bg-primaryDark transition text-white rounded-full px-8 py-4 text-[15px] font-semibold shadow-sm"
              >
                Get a Quote
              </a>

              {/* 移动端汉堡菜单 */}
              <button className="lg:hidden text-darkBlue text-3xl" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
                {mobileMenuOpen ? '✕' : '☰'}
              </button>

              {/* 移动端下拉菜单 */}
              {mobileMenuOpen && (
                <div className="absolute top-full left-0 w-full bg-white shadow-lg lg:hidden py-6 px-8 flex flex-col gap-6">
                  {navLinks.map((item, idx) => (
                    <a key={idx} className={item.active ? "nav-link-active w-fit" : "nav-link w-fit"} onClick={() => setMobileMenuOpen(false)}>
                      {item.name}
                    </a>
                  ))}
                  <a
                    href="mailto:admin@alwaysmooth.com.au?subject=Get%20a%20Quote"
                    className="bg-primary text-white text-center rounded-full px-8 py-4 font-semibold mt-2"
                    onClick={() => setMobileMenuOpen(false)}
                  >
                    Get a Quote
                  </a>
                </div>
              )}
            </div>
          </header>

          {/* HERO 首屏横幅 */}
          <section className="relative overflow-hidden bg-[#f6f9f9]">
            <div className="max-w-[1280px] mx-auto grid grid-cols-1 lg:grid-cols-2 items-center px-8 pt-20 pb-16 gap-12">
              <div>
                <div className="flex items-center gap-2 text-primary font-medium tracking-wide text-[16px] mb-8">
                  <span>✦</span><span>NATURAL • SOFT • RESPONSIBLE</span>
                </div>
                <h2 className="text-[72px] leading-[1.05] font-bold tracking-[-2px]">
                  <span className="text-darkBlue">100% VIRGIN PULP</span><br />
                  <span className="text-primary">PREMIUM TISSUE<br />PAPER PRODUCTS</span>
                </h2>
                <p className="mt-8 text-[24px] leading-[1.7] text-[#4d6477] max-w-[650px]">
                  Soft and strong, naturally gentle.<br />Quality you can feel, care you can trust.
                </p>
                <div className="flex flex-wrap gap-6 mt-10">
                  <button className="bg-primary text-white px-10 py-5 rounded-xl text-[18px] font-semibold shadow hover:bg-primaryDark transition">View Products</button>
                  <button className="border border-primary text-primary px-10 py-5 rounded-xl text-[18px] font-semibold hover:bg-[#eefafa] transition">Wholesale Enquiry</button>
                </div>
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-8 mt-16 text-center">
                  {featureList.map((item, i) => (
                    <div key={i}><div className="text-[34px] mb-3 text-primary">✦</div><p className="text-[15px] text-[#51687a]">{item}</p></div>
                  ))}
                </div>
              </div>
              <div className="relative">
                <img
                  src={heroImg}
                  alt="Premium tissue paper display"
                  loading="lazy"
                  crossOrigin="anonymous"
                  className="rounded-[30px] shadow-2xl object-cover w-full"
                  onError={(e) => e.target.src = "https://via.placeholder.com/800x600/f6f9f9/2ca6ad?text=Image+Unavailable"}
                />
              </div>
            </div>
          </section>

          {/* 产品区域 */}
          <section className="py-24 bg-white">
            <div className="max-w-[1280px] mx-auto px-8">
              <div className="text-center mb-16">
                <h3 className="text-[54px] font-bold text-darkBlue">Our Products</h3>
                <div className="w-[80px] h-[4px] bg-primary mx-auto mt-5 rounded-full"></div>
                <p className="text-[#65798a] text-[22px] mt-6">Complete paper solutions for homes, businesses and workplaces.</p>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-10">
                {productList.map((product, i) => (
                  <div key={i} className="bg-[#fbfdfd] border border-[#eef3f3] rounded-[24px] overflow-hidden card-shadow">
                    <div className="p-8">
                      <img
                        src={product.img}
                        alt={product.title}
                        loading="lazy"
                        crossOrigin="anonymous"
                        className="h-[250px] w-full object-contain"
                        onError={(e) => e.target.src = "https://via.placeholder.com/400x250/fbfdfd/2ca6ad"}
                      />
                    </div>
                    <div className="px-8 pb-8 text-center">
                      <h4 className="text-[32px] font-bold text-darkBlue">{product.title}</h4>
                      <p className="text-[#607687] text-[18px] leading-relaxed mt-4 min-h-[70px]">{product.desc}</p>
                      <button className="mt-6 text-primary text-[18px] font-semibold hover:underline">View More →</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* 选择我们优势 */}
          <section className="py-24 bg-bgLight">
            <div className="max-w-[1280px] mx-auto px-8">
              <div className="text-center mb-20">
                <h3 className="text-[54px] font-bold text-darkBlue">Why Choose Smoothia?</h3>
                <div className="w-[90px] h-[4px] bg-primary mx-auto mt-5 rounded-full"></div>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-10 text-center">
                {advantageList.map((item, i) => (
                  <div key={i}>
                    <div className="text-[48px] text-primary mb-5">✦</div>
                    <h4 className="font-bold text-[20px] text-darkBlue">{item}</h4>
                    <p className="text-[#667b8b] text-[16px] mt-3 leading-relaxed">Premium quality paper products designed for everyday use.</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          {/* 关于我们 + 批发咨询 */}
          <section className="grid grid-cols-1 lg:grid-cols-2">
            <div className="bg-white px-8 lg:px-16 py-20 flex flex-col justify-center">
              <h3 className="text-[52px] font-bold text-darkBlue mb-8">About Us</h3>
              <p className="text-[#5f7385] text-[20px] leading-[1.9] max-w-[700px]">
                Always Smooth Pty Ltd is an Australian-owned company dedicated to providing premium quality tissue paper products.
                <br /><br />
                We focus on excellence in raw materials, modern production and reliable service to meet the needs of our customers across Australia.
              </p>
              <button className="mt-10 bg-primary text-white w-fit px-10 py-5 rounded-xl text-[18px] font-semibold hover:bg-primaryDark transition">Learn More</button>
            </div>
            <div className="relative bg-gradient-to-br from-[#64c8ce] to-[#2b96a1] px-8 lg:px-16 py-20 text-white overflow-hidden">
              <div className="absolute inset-0 opacity-15 bg-[url('https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1600&auto=format&fit=crop')] bg-cover bg-center"></div>
              <div className="relative z-10">
                <h3 className="text-[52px] font-bold mb-8">Wholesale & Business Inquiry</h3>
                <p className="text-[21px] leading-[1.8] max-w-[700px] text-[#eefefe]">
                  We provide flexible solutions for retailers, wholesalers, and businesses. Let’s grow together.
                </p>
                <div className="flex flex-wrap gap-5 mt-10">
                  <a href="mailto:admin@alwaysmooth.com.au?subject=Wholesale Quote">
                    <button className="bg-white text-primary px-10 py-5 rounded-xl text-[18px] font-semibold hover:bg-gray-50 transition">Get a Quote</button>
                  </a>
                  <button className="border border-white px-10 py-5 rounded-xl text-[18px] font-semibold hover:bg-white/10 transition">Contact Us</button>
                </div>
              </div>
            </div>
          </section>

          {/* 邮件订阅 */}
          <section className="bg-[#f4f9f9] py-14 border-y border-[#e7efef]">
            <div className="max-w-[1280px] mx-auto px-8 flex flex-col lg:flex-row items-center justify-between gap-8">
              <div>
                <h3 className="text-[34px] font-bold text-darkBlue">Subscribe to our newsletter</h3>
                <p className="text-[#698090] text-[18px] mt-3">Get the latest news and offers.</p>
              </div>
              <form onSubmit={handleSubscribe} className="flex w-full lg:w-auto">
                <input
                  type="email"
                  placeholder="Your email address"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  className="w-full lg:w-[420px] h-[64px] px-6 rounded-l-xl border border-[#dfe9e9] outline-none text-[18px] focus:border-primary transition-colors"
                  required
                />
                <button type="submit" className="bg-primary hover:bg-primaryDark text-white px-10 rounded-r-xl text-[18px] font-semibold transition">Subscribe</button>
              </form>
            </div>
          </section>

          {/* 页脚 */}
          <footer className="bg-white py-20">
            <div className="max-w-[1280px] mx-auto px-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-16">
              <div className="lg:col-span-2">
                <h2 className="text-[56px] italic text-primaryLight font-georgia">Smoothia</h2>
                <p className="mt-6 text-textGray text-[18px] leading-relaxed max-w-[420px]">
                  Soft as silk, strong in quality.<br />Care for your life, care for our planet.
                </p>
                <div className="flex gap-5 mt-8 text-[24px] text-primary">
                  <span className="cursor-pointer hover:text-primaryDark transition">○</span>
                  <span className="cursor-pointer hover:text-primaryDark transition">○</span>
                  <span className="cursor-pointer hover:text-primaryDark transition">○</span>
                </div>
              </div>
              <div>
                <h4 className="font-bold text-[22px] mb-6 text-darkBlue">Products</h4>
                <ul className="space-y-4 text-textGray text-[18px]">
                  <li className="hover:text-primary cursor-pointer transition">Toilet Tissue</li>
                  <li className="hover:text-primary cursor-pointer transition">Facial Tissue</li>
                  <li className="hover:text-primary cursor-pointer transition">Kitchen Towel</li>
                  <li className="hover:text-primary cursor-pointer transition">Bulk & Wholesale</li>
                </ul>
              </div>
              <div>
                <h4 className="font-bold text-[22px] mb-6 text-darkBlue">Company</h4>
                <ul className="space-y-4 text-textGray text-[18px]">
                  <li className="hover:text-primary cursor-pointer transition">About Us</li>
                  <li className="hover:text-primary cursor-pointer transition">Our Factory</li>
                  <li className="hover:text-primary cursor-pointer transition">Quality Assurance</li>
                  <li className="hover:text-primary cursor-pointer transition">Sustainability</li>
                </ul>
              </div>
              <div>
                <h4 className="font-bold text-[22px] mb-6 text-darkBlue">Contact Us</h4>
                <ul className="space-y-4 text-textGray text-[18px] leading-relaxed">
                  <li><a href="mailto:admin@alwaysmooth.com.au" className="hover:text-primary transition">admin@alwaysmooth.com.au</a></li>
                </ul>
              </div>
            </div>
            <div className="text-center text-[#8ea0ad] text-[15px] mt-16">
              © 2026 Always Smooth Pty Ltd. All Rights Reserved.
            </div>
          </footer>
        </div>
      );
    }

const rootElement = document.getElementById('root');
const root = ReactDOM.createRoot(rootElement);
root.render(<SmoothiaHomepage />)
  </script>
</body>
</html>
